on:
  push:
    branches: ["main"]
    # tags: ["v*.*.*", "*.*.*"]
  workflow_dispatch:

jobs:
  publish-to-gitlab:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package
          path: ./dist

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=$GITHUB_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact to GitLab Package Registry
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          VERSION: ${{ steps.version.outputs.value }}
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          curl --fail \
            --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            --upload-file ./dist/app.zip \
            "$GITLAB_URL/api/v4/projects/$GITLAB_PROJECT_ID/packages/generic/$APP_NAME/$VERSION/app.zip"

      - name: Trigger GitLab pipeline
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          VERSION: ${{ steps.version.outputs.value }}
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "$GITLAB_URL/api/v4/projects/$GITLAB_PROJECT_ID/trigger/pipeline" \
            --form "token=$GITLAB_TRIGGER_TOKEN" \
            --form "ref=main" \
            --form "variables[ARTIFACT_VERSION]=$VERSION" \
            --form "variables[APP_NAME]=$APP_NAME" \
            --form "variables[SOURCE_REPO]=$GITHUB_REPOSITORY" \
            --form "variables[SOURCE_SHA]=$GITHUB_SHA")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          if [ "$status" != "201" ]; then
            echo "Trigger failed. HTTP $status — $body"
            exit 1
          fi

          echo "Pipeline $(echo $body | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])") triggered"
          echo "URL: $(echo $body | python3 -c "import sys,json; print(json.load(sys.stdin)['web_url'])")"
